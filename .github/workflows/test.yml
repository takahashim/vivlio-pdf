name: test

on:
  push:
    branches: [main]
  pull_request:
  # Lets the viewer-update workflow run these checks on the branch it pushes.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      # ubuntu-latest ships Chrome, which is what ferrum drives. Print the
      # version so a failure caused by a browser change is visible in the log.
      - name: Show Chrome version
        run: google-chrome --version

      - name: Run tests
        run: bundle exec rake test
